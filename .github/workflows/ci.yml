name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10.32.1
      - name: Use Node.js 22.13.1
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10.32.1
      - name: Use Node.js 22.13.1
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10.32.1
      - name: Use Node.js 22.13.1
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type Check
        run: pnpm type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10.32.1
      - name: Use Node.js 22.13.1
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build

  deploy:
    name: Deploy (Docker)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push shell image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/base.Dockerfile
          build-args: |
            APP_NAME=@devfolio/shell
            APP_DIR=shell
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devfolio-shell:latest
      - name: Build and push portfolio image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/base.Dockerfile
          build-args: |
            APP_NAME=@devfolio/portfolio
            APP_DIR=portfolio
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devfolio-portfolio:latest
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/backend.Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devfolio-backend:latest
