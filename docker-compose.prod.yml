services:
  portfolio:
    image: ${DOCKERHUB_USERNAME}/devfolio-portfolio:latest
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_PORTFOLIO_URL: NEXT_PUBLIC_PORTFOLIO_URL=https://vitality-apps.dev/portfolio
    networks:
      - devfolio-network
    restart: always

  shell:
    image: ${DOCKERHUB_USERNAME}/devfolio-shell:latest
    networks:
      - devfolio-network
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_PORTFOLIO_URL: NEXT_PUBLIC_PORTFOLIO_URL=https://vitality-apps.dev/portfolio
    restart: always

  backend:
    image: ${DOCKERHUB_USERNAME}/devfolio-backend:latest
    networks:
      - devfolio-network
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/devfolio
    depends_on:
      - postgres
    restart: always

  postgres:
    image: postgres:16-alpine
    networks:
      - devfolio-network
    container_name: devfolio-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devfolio
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - shell
      - portfolio
      - backend
    networks:
      - devfolio-network
    restart: always

networks:
  devfolio-network:
    driver: bridge

volumes:
  postgres_data:
