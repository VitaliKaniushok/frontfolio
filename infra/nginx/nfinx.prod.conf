events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name vitality-apps.dev www.vitality-apps.dev;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name vitality-apps.dev www.vitality-apps.dev;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;


        location = /_next/static/chunks/remoteEntry.js {
            proxy_pass http://portfolio:3001/_next/static/chunks/remoteEntry.js;
            proxy_set_header Host $host;
        }

        location /portfolio/ {
            # rewrite delete "/portfolio" from the URL path,
            # eg. /portfolio/_next/static/... rewrite to /_next/static/...
            rewrite ^/portfolio/(.*)$ /$1 break;

            proxy_pass http://portfolio:3001;
            proxy_set_header Host $host;
        }

        location /api/ {
            proxy_pass http://backend:3002;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://shell:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}